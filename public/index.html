<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        #map{
            height: 90vh;
        }
    </style>
</head>
<body>
    <h1>Live Location Tracker</h1>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket = io();

        const map = L.map('map').setView([51.505, -0.09], 13);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

    function getUserCurrentLocation() {

        return new Promise((res, rej) =>{
            if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
            (position) => {
                console.log(`Got user's location`,position); 
                const latitude = position?.coords?.latitude
                const longitude = position?.coords?.longitude  
                res({latitude, longitude})
            }, 
            (err) => {
             rej(err)
            },
            {enableHighAccuracy: true}
        );
        }else{
            alert('Geolocation is not available in this browser')
        }
        })
    }
    getUserCurrentLocation().then((p) => console.log( { p } )
    )

    let myCurrentLocationMarker = null;

    async function main() {
        setInterval(async () => {
            const { latitude, longitude} = await getUserCurrentLocation();
            socket.emit('client:location:update', { latitude, longitude })
            if (!myCurrentLocationMarker) {
                myCurrentLocationMarker = L.marker([latitude, longitude])
                .addTo(map)
                .bindPopup('You are here')
            }else{
                myCurrentLocationMarker.setLatLng([latitude, longitude])
            }
        }, 10 * 1000)
    }
    window.addEventListener('load', main)
    </script>
</body>
</html>
